name: athidihub
description: Production PG Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Networking
  dio: ^5.7.0

  # Supabase
  supabase_flutter: ^2.8.4

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.3

  # File Picker & Image
  image_picker: ^1.1.2
  file_picker: ^8.1.3
  webview_flutter: ^4.10.0
  json_annotation: ^4.9.0
  # Charts & Analytics
  fl_chart: ^0.70.2

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  connectivity_plus: ^6.1.3

  # PDF
  pdf: ^3.11.1
  printing: ^5.14.1
  open_filex: ^4.6.0

  # Local Storage
  shared_preferences: ^2.3.4

  # Notifications
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # Payments
  razorpay_flutter: ^1.3.7

  # Date & Time
  table_calendar: ^3.1.2

  # Misc
  flutter_animate: ^4.5.2
  skeletonizer: ^1.4.2
  package_info_plus: ^8.3.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  json_serializable: ^6.9.0
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/Athidihub_logo.png
  min_sdk_android: 21
